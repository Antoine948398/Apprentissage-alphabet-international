<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz Alphabet International</title>
<style>
body{font-family:system-ui,sans-serif;max-width:700px;margin:40px auto;padding:20px}
.letter{font-size:120px;font-weight:bold;text-align:center}
#timer{font-size:24px;text-align:center;margin:10px 0}
.progress{height:10px;background:#eee;border-radius:99px;overflow:hidden}
.progress-bar{height:100%;background:#4f46e5;width:100%}
input,button{padding:12px;font-size:18px}
.stats{margin-top:20px;display:flex;gap:20px;flex-wrap:wrap}
</style>
</head>
<body>
<h1>Alphabet international</h1>
<p>26 lettres par session, ordre aléatoire, 5 secondes par réponse.</p>

<div class="progress"><div class="progress-bar" id="progress"></div></div>
<div id="timer">⏱️ 5s</div>
<div class="letter" id="letter"></div>

<form id="form">
<input id="answer" autocomplete="off" placeholder="alpha, bravo..." />
<button>Valider</button>
</form>

<p id="feedback"></p>
<button id="skip" type="button">Passer</button>
<button id="restart" type="button">Nouvelle session</button>

<div class="stats">
<span>Progression: <b id="position"></b></span>
<span>Score: <b id="score"></b></span>
<span>Erreurs: <b id="errors"></b></span>
</div>

<script>
const alphabet={A:["alfa","alpha"],B:["bravo"],C:["charlie"],D:["delta"],E:["echo"],F:["foxtrot"],G:["golf"],H:["hotel"],I:["india"],J:["juliett","juliet"],K:["kilo"],L:["lima"],M:["mike"],N:["november"],O:["oscar"],P:["papa"],Q:["quebec"],R:["romeo"],S:["sierra"],T:["tango"],U:["uniform"],V:["victor"],W:["whiskey","whisky"],X:["xray","x-ray","x ray"],Y:["yankee"],Z:["zulu"]};

const letters=Object.keys(alphabet);
let session=[],index=0,score=0,errors=0,current="";
let timer=null,remaining=5;

const letterEl=document.getElementById("letter");
const answerEl=document.getElementById("answer");
const feedbackEl=document.getElementById("feedback");
const timerEl=document.getElementById("timer");
const progressEl=document.getElementById("progress");

function normalize(t){
 return t.trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function shuffle(a){
 const c=[...a];
 for(let i=c.length-1;i>0;i--){
  const j=Math.floor(Math.random()*(i+1));
  [c[i],c[j]]=[c[j],c[i]];
 }
 return c;
}

function updateStats(){
 document.getElementById("score").textContent=score;
 document.getElementById("errors").textContent=errors;
 document.getElementById("position").textContent=Math.min(index+1,26)+" / 26";
 progressEl.style.width=((index/26)*100)+"%";
}

function stopTimer(){ clearInterval(timer); }

function timeoutFail(){
 stopTimer();
 errors++;
 feedbackEl.textContent="⏰ Temps écoulé ! Réponse : "+alphabet[current][0];
 updateStats();
 setTimeout(()=>{index++;nextLetter();},1200);
}

function startTimer(){
 stopTimer();
 remaining=5;
 timerEl.textContent="⏱️ "+remaining+"s";
 timer=setInterval(()=>{
   remaining--;
   timerEl.textContent="⏱️ "+remaining+"s";
   if(remaining<=0) timeoutFail();
 },1000);
}

function nextLetter(){
 if(index>=26){
   stopTimer();
   letterEl.textContent="🎉";
   timerEl.textContent="🏁";
   feedbackEl.textContent="Session terminée : "+score+"/26";
   answerEl.disabled=true;
   return;
 }
 current=session[index];
 letterEl.textContent=current;
 answerEl.value="";
 answerEl.focus();
 updateStats();
 startTimer();
}

document.getElementById("form").addEventListener("submit",e=>{
 e.preventDefault();
 if(!current) return;
 stopTimer();

 const ans=normalize(answerEl.value);
 const valid=alphabet[current].map(normalize);

 if(valid.includes(ans)){
   score++;
   feedbackEl.textContent="✅ Correct";
 }else{
   errors++;
   feedbackEl.textContent="❌ Réponse : "+alphabet[current][0];
 }

 updateStats();
 setTimeout(()=>{index++;nextLetter();},700);
});

document.getElementById("skip").addEventListener("click",()=>{
 stopTimer();
 errors++;
 feedbackEl.textContent="Réponse : "+alphabet[current][0];
 updateStats();
 setTimeout(()=>{index++;nextLetter();},700);
});

document.getElementById("restart").addEventListener("click",()=>{
 session=shuffle(letters);
 index=0;score=0;errors=0;
 answerEl.disabled=false;
 feedbackEl.textContent="";
 nextLetter();
});

session=shuffle(letters);
nextLetter();
</script>
</body>
</html>
