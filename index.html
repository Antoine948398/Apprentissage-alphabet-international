<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Alphabet International</title>
  <style>
    :root {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #f5f7fb;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(540px, 100%);
      background: white;
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(20, 32, 54, .12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
    }
    p {
      color: #5c6780;
      margin-top: 0;
    }
    .progress-wrap {
      margin: 20px 0 6px;
      height: 10px;
      border-radius: 999px;
      background: #e8ebf5;
      overflow: hidden;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: #5267ff;
      transition: width .25s ease;
    }
    .letter {
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 800;
      text-align: center;
      margin: 18px 0;
      line-height: 1;
    }
    form {
      display: flex;
      gap: 10px;
    }
    input {
      flex: 1;
      font-size: 1.1rem;
      padding: 14px 16px;
      border: 2px solid #d8deea;
      border-radius: 14px;
      outline: none;
    }
    input:focus {
      border-color: #5267ff;
    }
    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-weight: 700;
      cursor: pointer;
      background: #5267ff;
      color: white;
      font-size: 1rem;
    }
    button.secondary {
      background: #e8ebf5;
      color: #172033;
      width: 100%;
      margin-top: 12px;
    }
    button:disabled,
    input:disabled {
      opacity: .55;
      cursor: not-allowed;
    }
    .feedback {
      min-height: 32px;
      margin: 16px 0 8px;
      font-weight: 700;
    }
    .ok { color: #118a45; }
    .ko { color: #c43c3c; }
    .done { color: #5267ff; }
    .stats {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      color: #5c6780;
      font-size: .95rem;
      flex-wrap: wrap;
    }
    .hint {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f0f3ff;
      font-size: .95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>Alphabet international</h1>
    <p>Une session contient les 26 lettres, dans un ordre aléatoire, sans répétition.</p>

    <div class="progress-wrap" aria-label="Progression">
      <div class="progress" id="progress"></div>
    </div>

    <div class="letter" id="letter">A</div>

    <form id="form" autocomplete="off">
      <input id="answer" placeholder="ex. alpha" autofocus />
      <button id="validate">Valider</button>
    </form>

    <div class="feedback" id="feedback"></div>

    <button class="secondary" id="skip" type="button">Passer</button>
    <button class="secondary" id="restart" type="button">Nouvelle session</button>

    <div class="stats">
      <span>Progression : <strong id="position">1 / 26</strong></span>
      <span>Score : <strong id="score">0</strong></span>
      <span>Erreurs : <strong id="errors">0</strong></span>
      <span>Précision : <strong id="accuracy">0%</strong></span>
    </div>

    <div class="hint">
      Astuce : les accents et la casse sont ignorés. “Alfa” est accepté pour A.
    </div>
  </main>

  <script>
    const alphabet = {
      A: ["alfa", "alpha"],
      B: ["bravo"],
      C: ["charlie"],
      D: ["delta"],
      E: ["echo"],
      F: ["foxtrot"],
      G: ["golf"],
      H: ["hotel"],
      I: ["india"],
      J: ["juliett", "juliet"],
      K: ["kilo"],
      L: ["lima"],
      M: ["mike"],
      N: ["november"],
      O: ["oscar"],
      P: ["papa"],
      Q: ["quebec"],
      R: ["romeo"],
      S: ["sierra"],
      T: ["tango"],
      U: ["uniform"],
      V: ["victor"],
      W: ["whiskey", "whisky"],
      X: ["x-ray", "xray", "x ray"],
      Y: ["yankee"],
      Z: ["zulu"]
    };

    const letters = Object.keys(alphabet);
    let session = [];
    let index = 0;
    let score = 0;
    let errors = 0;
    let current = "";

    const letterEl = document.querySelector("#letter");
    const answerEl = document.querySelector("#answer");
    const feedbackEl = document.querySelector("#feedback");
    const scoreEl = document.querySelector("#score");
    const errorsEl = document.querySelector("#errors");
    const accuracyEl = document.querySelector("#accuracy");
    const positionEl = document.querySelector("#position");
    const progressEl = document.querySelector("#progress");
    const form = document.querySelector("#form");
    const skipBtn = document.querySelector("#skip");
    const restartBtn = document.querySelector("#restart");
    const validateBtn = document.querySelector("#validate");

    function normalize(text) {
      return text
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/\s+/g, " ");
    }

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function startSession() {
      session = shuffle(letters);
      index = 0;
      score = 0;
      errors = 0;
      feedbackEl.className = "feedback";
      feedbackEl.textContent = "";
      answerEl.disabled = false;
      validateBtn.disabled = false;
      skipBtn.disabled = false;
      nextLetter();
      updateStats();
    }

    function nextLetter() {
      if (index >= session.length) {
        endSession();
        return;
      }

      current = session[index];
      letterEl.textContent = current;
      answerEl.value = "";
      answerEl.focus();
      updateStats();
    }

    function endSession() {
      current = "";
      letterEl.textContent = "🎉";
      answerEl.value = "";
      answerEl.disabled = true;
      validateBtn.disabled = true;
      skipBtn.disabled = true;
      feedbackEl.className = "feedback done";
      feedbackEl.textContent = `Session terminée : ${score} / 26 bonnes réponses.`;
      updateStats();
    }

    function updateStats() {
      const answered = Math.min(index, session.length);
      const totalAttempts = score + errors;
      const position = index >= session.length ? 26 : index + 1;

      scoreEl.textContent = score;
      errorsEl.textContent = errors;
      positionEl.textContent = `${position} / 26`;
      accuracyEl.textContent = totalAttempts ? Math.round((score / totalAttempts) * 100) + "%" : "0%";
      progressEl.style.width = `${(answered / 26) * 100}%`;
    }

    function correctAnswer() {
      return alphabet[current][0];
    }

    function goToNextAfterDelay(delay = 650) {
      setTimeout(() => {
        feedbackEl.textContent = "";
        index++;
        nextLetter();
      }, delay);
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      if (!current) return;

      const userAnswer = normalize(answerEl.value);
      if (!userAnswer) return;

      const accepted = alphabet[current].map(normalize);

      if (accepted.includes(userAnswer)) {
        score++;
        feedbackEl.className = "feedback ok";
        feedbackEl.textContent = "✅ Correct !";
        updateStats();
        goToNextAfterDelay();
      } else {
        errors++;
        feedbackEl.className = "feedback ko";
        feedbackEl.textContent = `❌ Réponse : ${correctAnswer()}`;
        updateStats();
        goToNextAfterDelay(1200);
      }
    });

    skipBtn.addEventListener("click", () => {
      if (!current) return;
      errors++;
      feedbackEl.className = "feedback ko";
      feedbackEl.textContent = `Réponse : ${correctAnswer()}`;
      updateStats();
      goToNextAfterDelay(900);
    });

    restartBtn.addEventListener("click", startSession);

    startSession();
  </script>
</body>
</html>
